<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساحة الاختبارات - أسس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="menu-exam.css">
</head>
<body>

    <header>
        <h1>اختر الاختبار الرياضي 🧠</h1>
        <p>ابدأ رحلتك لتصبح ملك الأرقام، اختر نوع الاختبار واستعد للمنافسة العالمية!</p>
    </header>

    <main class="cards-container">
        <div class="game-card addition" onclick="location.href='quiz-plus.html'">
            <div class="icon-box">➕</div>
            <h2>الاختبار الجمع</h2>
            
            <span class="play-btn">ابدأ الآن</span>
        </div>

        <div class="game-card subtraction" onclick="location.href='quiz-m.html'">
            <div class="icon-box">➖</div>
            <h2>الاختبار الطرح</h2>
            
            <span class="play-btn">ابدأ الآن</span>
        </div>

        <div class="game-card multiplication" onclick="location.href='quiz-plus copy.html'">
            <div class="icon-box multiplier">✖️</div>
            <h2>الاختبار الضرب</h2>
           
            <span class="play-btn">ابدأ الآن</span>
        </div>

        <div class="game-card division locked" onclick="location.href='quiz-m copy.html'">
            <div class="icon-box divider">➗</div>
            <h2>الاختبار القسمة</h2>
           
            <span class="play-btn">ابدأ الآن</span>
        </div>
    </main>

    <footer>
        <a href="home.html" class="back-link">⬅️ العودة للوحة التحكم</a>
    </footer>

</body>
</html>
