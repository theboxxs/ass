<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أبطال أُسُس</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        .btn-group { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 8px 15px; border: none; border-radius: 8px; background: #3498db; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .gold { color: #f1c40f; font-weight: bold; }
        .silver { color: #95a5a6; }
        .bronze { color: #d35400; }
        #status { color: #e74c3c; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="modeTitle">أبطال الجمع ➕</h2>
    
    <div class="btn-group">
        <button onclick="loadData('addition')">الجمع</button>
        <button onclick="loadData('multiplication')">الضرب</button>
        <button onclick="loadData('minus')">الطرح</button>
        <button onclick="loadData('division')">القسمة</button>
    </div>

    <div id="status"></div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>البطل</th>
                <th>النقاط</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    
    <br>
    <button style="background:#95a5a6; width:100%" onclick="window.location.href='index.html'">رجوع</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj8bNAd5axoXs9EnvGso7kBF1S9dgUEqM",
        authDomain: "asss-d3452.firebaseapp.com",
        databaseURL: "https://asss-d3452-default-rtdb.firebaseio.com",
        projectId: "asss-d3452",
        storageBucket: "asss-d3452.firebasestorage.app",
        messagingSenderId: "169933688004",
        appId: "1:169933688004:web:3d367c0127d12242414d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.loadData = async function(mode) {
        const tbody = document.getElementById("tableBody");
        const status = document.getElementById("status");
        const modeTitle = document.getElementById("modeTitle");

        const titles = { 'addition': 'أبطال الجمع ➕', 'multiplication': 'أبطال الضرب ✖️', 'minus': 'أبطال الطرح ➖', 'division': 'أبطال القسمة ➗' };
        modeTitle.innerText = titles[mode];
        
        status.innerText = "جاري التحميل...";
        tbody.innerHTML = "";

        // ملاحظة مهمة: المسار هنا هو 'leaderboard/' + النوع
        const scoresRef = query(ref(db, 'leaderboard/' + mode), orderByChild("score"), limitToLast(10));

        try {
            const snapshot = await get(scoresRef);
            status.innerText = "";

            if (snapshot.exists()) {
                let data = [];
                snapshot.forEach(child => {
                    data.push(child.val());
                });

                // ترتيب من الأعلى للأقل
                data.sort((a, b) => b.score - a.score).forEach((item, index) => {
                    let rankClass = index === 0 ? 'gold' : (index === 1 ? 'silver' : (index === 2 ? 'bronze' : ''));
                    tbody.innerHTML += `
                        <tr>
                            <td class="${rankClass}">${index + 1}</td>
                            <td>${item.name}</td>
                            <td>${item.score.toLocaleString()}</td>
                        </tr>`;
                });
            } else {
                status.innerText = "لا توجد نتائج في هذا القسم حتى الآن.";
            }
        } catch (err) {
            console.error(err);
            status.innerText = "خطأ: تأكد من إعدادات الحماية (Rules) في Firebase.";
        }
    }

    // تشغيل الجمع تلقائياً عند البدء
    window.onload = () => loadData('addition');
</script>
</body>
</html>
