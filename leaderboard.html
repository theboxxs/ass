<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أُسُس - لوحة الأبطال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="quiz-plus.css">
    <style>
        /* تنسيق أزرار التبديل */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1a1a35;
            border: 1px solid #252545;
            color: #8b8b9a;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--brand-red);
            color: white;
            border-color: var(--brand-red);
            box-shadow: 0 0 15px rgba(243, 26, 26, 0.3);
        }
        .leaderboard-table { width: 100%; border-collapse: collapse; color: white; }
        .leaderboard-table th { color: var(--brand-red); padding: 15px; border-bottom: 2px solid #252545; }
        .leaderboard-table td { padding: 12px; border-bottom: 1px solid #1a1a35; text-align: center; }
        .rank-1 { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <button class="exit-btn" onclick="location.href='home.html'">🏠 العودة</button>

    <div class="main-container">
        <header class="game-header">
            <h1 class="logo-text">لوحة الأبطال</h1>
            <p style="color: #8b8b9a; margin-bottom: 20px;">اختر العملية لعرض المتصدرين</p>
            
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('addition', this)">الجمع ➕</button>
                <button class="tab-btn" onclick="switchTab('minus', this)">الطرح ➖</button>
                <button class="tab-btn" onclick="switchTab('multiplication', this)">الضرب ✖</button>
                <button class="tab-btn" onclick="switchTab('division', this)">القسمة ➗</button>
            </div>
        </header>

        <main class="quiz-card" style="padding: 20px;">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>المركز</th>
                        <th>اللاعب</th>
                        <th>النقاط</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    </tbody>
            </table>
        </main>
    </div>

    <script type="module" src="leaderboard.js"></script>
</body>
</html>
