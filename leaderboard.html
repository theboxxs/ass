<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أبطال أُسُس</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: #2c3e50; margin-bottom: 20px; }

        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 12px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        button:hover { background-color: #2980b9; transform: translateY(-2px); }
        button.active { background-color: #2c3e50; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        th { background-color: #f8f9fa; color: #7f8c8d; font-size: 14px; }

        /* تلوين المراكز الثلاثة الأولى */
        tr:nth-child(1) td:nth-child(1) { color: #f1c40f; font-weight: bold; font-size: 1.3em; } /* ذهبي */
        tr:nth-child(2) td:nth-child(1) { color: #95a5a6; font-weight: bold; } /* فضي */
        tr:nth-child(3) td:nth-child(1) { color: #e67e22; font-weight: bold; } /* برونزي */

        .back-btn {
            margin-top: 20px;
            background-color: #95a5a6;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="currentModeTitle">أبطال الجمع ➕</h2>

    <div class="filter-buttons">
        <button onclick="loadLeaderboard('addition')">الجمع</button>
        <button onclick="loadLeaderboard('minus')">الطرح</button>
        <button onclick="loadLeaderboard('multiplication')">الضرب</button>
        <button onclick="loadLeaderboard('division')">القسمة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>المركز</th>
                <th>الاسم</th>
                <th>النقاط</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
            <tr><td colspan="3">جاري التحميل...</td></tr>
        </tbody>
    </table>

    <button class="back-btn" onclick="window.location.href='home.html'">العودة للرئيسية</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj8bNAd5axoXs9EnvGso7kBF1S9dgUEqM",
        authDomain: "asss-d3452.firebaseapp.com",
        databaseURL: "https://asss-d3452-default-rtdb.firebaseio.com",
        projectId: "asss-d3452",
        storageBucket: "asss-d3452.firebasestorage.app",
        messagingSenderId: "169933688004",
        appId: "1:169933688004:web:3d367c0127d12242414d91"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // جعل الدالة عالمية لكي تعمل مع onclick في HTML
    window.loadLeaderboard = async function(mode) {
        const tableBody = document.getElementById("leaderboardBody");
        const titleDisplay = document.getElementById("currentModeTitle");

        const modeNames = {
            'addition': 'أبطال الجمع ➕',
            'minus': 'أبطال الطرح ➖',
            'multiplication': 'أبطال الضرب ✖️',
            'division': 'أبطال القسمة ➗'
        };
        
        titleDisplay.innerText = modeNames[mode];
        tableBody.innerHTML = "<tr><td colspan='3'>جاري جلب الأبطال... ⏳</td></tr>";

        const dbRef = query(ref(db, `leaderboard/${mode}`), orderByChild("score"), limitToLast(10));

        try {
            const snapshot = await get(dbRef);
            tableBody.innerHTML = ""; 
            
            if (snapshot.exists()) {
                let players = [];
                snapshot.forEach((child) => {
                    players.push(child.val());
                });

                // ترتيب من الأعلى للأقل
                players.reverse().forEach((player, index) => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${player.name}</td>
                            <td>${player.score.toLocaleString()}</td>
                        </tr>`;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='3'>لا توجد نتائج مسجلة هنا بعد 🏆</td></tr>";
            }
        } catch (error) {
            console.error(error);
            tableBody.innerHTML = "<tr><td colspan='3'>خطأ في الاتصال بالقاعدة ⚠️</td></tr>";
        }
    }

    // تحميل الجمع تلقائياً عند فتح الصفحة
    window.onload = () => loadLeaderboard('addition');
</script>

</body>
</html>
